name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Tests
        env:
          SUPABASE_URL: "https://bgyvfktnjzqhgrradvhh.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "mock-key"
          MOCK_MODE: "true"
        run: |
          python -m pytest backend/tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install Dependencies
        run: |
          cd web
          npm ci

      - name: Build Application
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://bgyvfktnjzqhgrradvhh.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-key"
          NEXT_PUBLIC_API_URL: "https://backend-phi-five-39.vercel.app"
        run: |
          cd web
          npm run build
